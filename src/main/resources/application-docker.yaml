spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/voting
    username: voting
    password: voting
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none          # ← меняем с validate на none (таблицы создаёт init.sql)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never              # ← отключаем автоматическую инициализацию

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus